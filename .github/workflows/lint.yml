name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          shellcheck -x -S warning scripts/setup-dev-tools-mac.sh
          shellcheck -x -S warning scripts/setup-dev-tools-linux.sh

  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $excludeRules = @(
            'PSAvoidUsingWriteHost',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingEmptyCatchBlock',
            'PSUseDeclaredVarsMoreThanAssignments',
            'PSAvoidOverwritingBuiltInCmdlets',
            'PSUseApprovedVerbs',
            'PSUseSingularNouns',
            'PSUseBOMForUnicodeEncodedFile',
            'PSPossibleIncorrectUsageOfRedirectionOperator'
          )
          $results = Invoke-ScriptAnalyzer -Path scripts/setup-dev-tools-windows.ps1 -Severity Warning,Error -ExcludeRule $excludeRules
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no issues found"

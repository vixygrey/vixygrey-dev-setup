name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build macOS zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p build/macos
          cp scripts/setup-dev-tools-mac.sh build/macos/
          cp docs/GUIDE.md build/macos/
          cp docs/SHORTCUTS.md build/macos/
          cp README.md LICENSE build/macos/
          cd build/macos && zip -r "../../vixygrey-dev-setup-macos-${VERSION}.zip" . && cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            vixygrey-dev-setup-macos-${{ steps.version.outputs.version }}.zip
